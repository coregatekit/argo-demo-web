name: Build and Deploy (Release)

on:
  push:
    tags:
      - "v*.*.*"

env:
  IMAGE_NAME: ghcr.io/coregatekit/${{ github.event.repository.name }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      tag: ${{ steps.vars.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set output
        id: vars
        run: echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest

      # --------------------------------
      # Update GitOps Repo
      # --------------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout GitOps Repo
        uses: actions/checkout@v5
        with:
          repository: coregatekit/gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update image tag in production
        run: |
          cd gitops/apps/demo-web/overlays/production
          sed -i "s/newTag: .*/newTag: \"${{ needs.build.outputs.tag }}\"/" kustomization.yaml

      - name: Commit and Push changes
        run: |
          cd gitops
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add apps/demo-web/overlays/production/kustomization.yaml
          git commit -m "Update image tag to ${{ needs.build.outputs.tag }} for production" || echo "No changes"

          git push origin main
